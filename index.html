<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de IMC</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h2>Calculadora de IMC</h2>

<select id="sexo">
<option value="m">Homem</option>
<option value="f">Mulher</option>
</select>

<input type="number" id="idade" placeholder="Idade" min="1" max="120">

<input type="text" id="altura" placeholder="Altura (ex: 1,75)">

<input type="number" id="peso" placeholder="Peso (kg)" min="1" max="300" step="0.1">

<button onclick="calcular()">Calcular</button>

<div class="gauge">

<div class="semi" id="painel"></div>

<div class="valor">

<h1 id="imc">0.0</h1>
<p id="categoria"></p>

</div>

</div>

<!-- RELATÓRIO -->

<div id="relatorio"></div>

<!-- BOTÃO PDF -->

<button class="pdf-btn" onclick="baixarPDF()">
Baixar Relatório PDF
</button>

<!-- BOTÃO QR -->

<button onclick="gerarQR()">
Gerar QR Code
</button>

<!-- QR CODE (agora dentro do app) -->

<div id="qrcode"></div>

<button onclick="novoCalculo()">
Novo cálculo
</button>

</div>

<!-- bibliotecas -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- seu javascript -->

<script src="script.js"></script>

</body>

</html>
